<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'"><title>Codex Usage Widget</title><link rel="stylesheet" href="./style.css"></head>
<body><main class="widget"><div class="brand"><span class="mark">◇</span><span class="online"></span><strong>Codex</strong></div><i class="line"></i>
  <section class="usage blue"><span class="usage-icon">◷</span><div class="usage-data"><p>5小时额度 <b id="five-value">--%</b></p><div class="progress"><i id="five-bar"></i></div><small>重置 <em id="five-reset">--</em></small></div></section>
  <section class="usage violet"><span class="usage-icon">◇</span><div class="usage-data"><p>周额度 <b id="week-value">--%</b></p><div class="progress"><i id="week-bar"></i></div><small>重置 <em id="week-reset">--</em></small></div></section>
  <i class="line end-line"></i><button class="pin" id="pin" title="切换始终置顶"><span>⌖</span><small id="pin-label">置顶</small></button><button class="theme" id="theme" title="切换浅色 / 深色主题"><span id="theme-icon">☼</span><small id="theme-label">浅色</small></button>
</main><script src="./app.js"></script></body></html>
